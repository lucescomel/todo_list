name: CI — Todo App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Tests Backend (Pytest + Django)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend — Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  # JOB 2 : Tests Frontend (Vitest + RTL)
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run unit tests
        working-directory: frontend
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 3 : Tests E2E (Cypress) — dépend des 2 jobs précédents
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E — Cypress
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Prepare test database + user
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py shell -c "
          from django.contrib.auth.models import User;
          User.objects.filter(username='testuser').delete();
          User.objects.create_user('testuser', password='testpass123')
          "

      - name: Start Django server
        working-directory: backend
        run: python manage.py runserver &
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start Vite preview
        working-directory: frontend
        run: npm run preview &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:8000/api/auth/token/ --timeout 30000
          npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Cypress
        working-directory: frontend
        run: npx cypress run --config baseUrl=http://localhost:4173

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
