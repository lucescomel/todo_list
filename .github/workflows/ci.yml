name: CI — Todo App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate
      - name: Run tests
        working-directory: backend
        run: pytest --tb=short -q

  frontend-tests:
    name: Frontend — Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run unit tests
        working-directory: frontend
        run: npm test

  e2e-tests:
    name: E2E — Cypress
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Prepare DB + test user
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py shell -c "
          from django.contrib.auth.models import User;
          User.objects.filter(username='testuser').delete();
          User.objects.create_user('testuser', password='testpass123')
          "

      - name: Start Django server
        working-directory: backend
        run: |
          python manage.py runserver 127.0.0.1:8000 > /tmp/django.log 2>&1 &
          echo "Django PID: $!"
          sleep 5
          echo "=== Django logs ==="
          cat /tmp/django.log
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start Vite preview
        working-directory: frontend
        run: npx vite preview --host 127.0.0.1 --port 4173 &

      - name: Wait for servers
        run: |
          npx wait-on tcp:127.0.0.1:8000 --timeout 60000 --interval 1000
          npx wait-on http://127.0.0.1:4173 --timeout 30000 --interval 1000

      - name: Install Cypress binary
        working-directory: frontend
        run: npx cypress install

      - name: Run Cypress
        working-directory: frontend
        run: npx cypress run --config baseUrl=http://127.0.0.1:4173

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots