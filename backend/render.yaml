services:
  - type: web
    name: todo-app-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # à renseigner manuellement avec l'URL Supabase
      - key: ALLOWED_HOSTS
        sync: false          # ex: todo-app-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # ex: https://your-app.netlify.app
      - key: SENTRY_DSN
        sync: false          # ex: https://xxx@sentry.io/yyy
